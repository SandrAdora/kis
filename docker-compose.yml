services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kisSystem
      POSTGRES_USER: kisSystem
      POSTGRES_PASSWORD: kisSystem
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisSystem"]
      interval: 5s
      retries: 5

  backend:
    build: ./kis_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./kis_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
